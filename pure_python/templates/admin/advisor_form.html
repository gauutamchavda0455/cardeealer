<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carss Admin | {{form_title}}</title>
  <link rel="stylesheet" href="/static/css/bootstrap.css">
  <link rel="stylesheet" href="/static/css/all.css">
  <style>
    .sidebar { background: #2c3e50; min-height: 100vh; }
    .sidebar a { color: #ecf0f1; display: block; padding: 12px 20px; text-decoration: none; border-bottom: 1px solid #34495e; }
    .sidebar a:hover, .sidebar a.active { background: #34495e; color: #fff; }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-2 sidebar p-0">
        <div class="text-center py-3 text-white"><h4><i class="fas fa-cog"></i> Carss Admin</h4></div>
        <a href="/admin/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="/admin/listings"><i class="fas fa-car"></i> Listings</a>
        <a href="/admin/advisors" class="active"><i class="fas fa-users"></i> Advisors</a>
        <a href="/admin/contacts"><i class="fas fa-envelope"></i> Contacts</a>
        <hr style="border-color:#34495e;">
        <a href="/"><i class="fas fa-globe"></i> View Site</a>
        <a href="/admin/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>

      <div class="col-md-10 p-4">
        {{messages}}
        <h2>{{form_title}}</h2>
        <a href="/admin/advisors" class="btn btn-secondary mb-3"><i class="fas fa-arrow-left"></i> Back</a>
        <hr>
        <form action="{{form_action}}" method="POST">
          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label>Name *</label>
                <input type="text" name="name" class="form-control" value="{{name}}" required>
              </div>
              <div class="form-group">
                <label>Phone *</label>
                <input type="text" name="phone" class="form-control" value="{{phone}}" required>
              </div>
              <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" class="form-control" value="{{email}}" required>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <label>Photo Path</label>
                <input type="text" name="photo" class="form-control" placeholder="photos/2024/01/01/photo.jpg">
              </div>
              <div class="form-group">
                <label>Description</label>
                <textarea name="description" class="form-control" rows="4">{{description}}</textarea>
              </div>
              <div class="form-check mb-3">
                <input type="checkbox" name="is_mvp" class="form-check-input" id="mvp" {{mvp_checked}}>
                <label class="form-check-label" for="mvp">Seller of the Month (MVP)</label>
              </div>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save"></i> Save</button>
        </form>
      </div>
    </div>
  </div>
  <script src="/static/js/jquery-3.3.1.min.js"></script>
  <script src="/static/js/bootstrap.bundle.min.js"></script>
</body>
</html>
